minimumReleaseAge: 4320

shellEmulator: true

trustPolicy: no-downgrade

packages:
  - site/**

# semver@6.3.1 (pulled in by @babel/core)
# lacks provenance attestation; force 7.x which has it
# to satisfy the no-downgrade trust policy
overrides:
  semver: 7.8.4

catalogs:
  linting:
    '@antfu/eslint-config': 9.0.0
    '@eslint-react/eslint-plugin': 5.8.19
    '@tanstack/eslint-plugin-query': 5.101.0
    eslint: 10.4.1
    eslint-plugin-format: 2.0.1
    eslint-plugin-react-hooks: 7.1.0
    eslint-plugin-react-refresh: 0.5.2

  tooling:
    '@types/node': 25.9.3
    husky: 9.1.7
    lint-staged: 17.0.7
    typescript: 6.0.3
